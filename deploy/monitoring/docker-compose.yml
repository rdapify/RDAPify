# RDAPify Monitoring Stack
#
# Services:
#   rdapify    — RDAP service          http://localhost:8080  metrics: localhost:9090
#   prometheus — Metrics collection    http://localhost:9091
#   grafana    — Dashboards            http://localhost:3000  (admin / see GRAFANA_ADMIN_PASSWORD)
#
# Quick start:
#   cp .env.example .env          # set GRAFANA_ADMIN_PASSWORD
#   docker compose up -d
#   docker compose logs -f rdapify
#
# To point at a running rdapify (instead of starting one here):
#   1. Remove the `rdapify` service block below.
#   2. Change `rdapify:9090` → your rdapify host in prometheus.yml.
#   3. Remove the rdapify entry from `depends_on` in the prometheus block.

services:

  # ── RDAPify ────────────────────────────────────────────────────────────────
  rdapify:
    image: ghcr.io/rdapify/rdapify:0.4.0
    container_name: rdapify
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # Prometheus metrics endpoint
    volumes:
      - ./rdapify.toml:/etc/rdapify/rdapify.toml:ro
    environment:
      RDAPIFY_LOG_LEVEL: info
      RDAPIFY_LOG_FORMAT: json
      RDAPIFY_SERVER_PORT: "8080"
      RDAPIFY_METRICS_PORT: "9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - rdapify-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"   # Prometheus UI on 9091 (9090 is taken by rdapify metrics)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=5GB
      - --web.enable-lifecycle
      - --web.enable-admin-api
    depends_on:
      rdapify:
        condition: service_healthy
    networks:
      - rdapify-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rdapify.json
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - rdapify-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  rdapify-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  prometheus-data:
  grafana-data:
